[workspace]
name = "logging"
version = "0.1.0"
authors = ["Marius S <marius@seritan.net>"]
description = "Timestamped log lines for Mojo, stamped at the moment of the call — the log file itself carries [HH:MM:SS.mmm] prefixes, with no tail-time filter."
# Org nightly — matches the other millfolio Mojo libs so it resolves via `-I`
# against the same toolchain.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b3.dev2026062706"

[tasks]
# Pure Mojo + libc FFI (gettimeofday/localtime_r), no extra deps — consumers
# just `-I ../logging.mojo/src`.
test = { cmd = "mkdir -p build && mojo build test/logging_test.mojo -I src -o build/logging-test && ./build/logging-test" }
